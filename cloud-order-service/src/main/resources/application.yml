server:
  port: 8000

spring:
  application:
    name: cloud-order-service
  profiles:
    active: dev
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: ${spring.application.name}
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 3000
          cloud-payment-service:
            connect-timeout: 20000
            read-timeout: 20000
      httpclient:
        hc5:
          enabled: true
      compression:
        request:
          enabled: true
          min-request-size: 2048
        response:
          enabled: true
      circuitbreaker:
        enabled: true
        group:
          enabled: true
#    loadbalancer:
#      retry:
#        enabled: true
#        max-retries-on-same-service-instance: 2
logging:
  level:
    com:
      cl:
        common:
          api:
            PayApi: debug
