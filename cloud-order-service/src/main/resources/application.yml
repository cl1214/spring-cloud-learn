    configs:
      default:
        max-concurrent-calls: 2
        max-wait-duration: 1s
    instances:
      cloud-payment-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeout-duration:
          20s

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers
  health:
    circuitbreakers:
      enabled: true
    logging:
      level:
        org.springframework.aop: DEBUG
        org.springframework.context: DEBUG
        io.github.resilience4j: TRACE